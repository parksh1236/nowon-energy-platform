<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노원구 에너지정보플랫폼</title>
<style>
  /* ── 기본 레이아웃 ───────────────────────────── */
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
  #wrap { display:flex; height:100%; }
  #sidebar { width:360px; min-width:360px; background:#0f2540; color:#fff; display:flex; flex-direction:column; overflow:hidden; }
  #map { flex:1; position:relative; }

  /* ── 헤더 ───────────────────────────────────── */
  .hd { padding:16px 18px 12px; border-bottom:1px solid rgba(255,255,255,.12); }
  .hd h1 { font-size:19px; letter-spacing:-.5px; }
  .hd h1 span { color:#4fd1a5; }
  .hd p { font-size:11.5px; color:#9db3cc; margin-top:4px; }

  /* ── 컨트롤 ─────────────────────────────────── */
  .ctrl { padding:12px 18px; border-bottom:1px solid rgba(255,255,255,.12); }
  .ctrl label.t { display:block; font-size:11.5px; color:#9db3cc; margin-bottom:6px; }
  .seg { display:flex; gap:6px; }
  .seg button { flex:1; padding:7px 0; font-size:13px; border:1px solid rgba(255,255,255,.25); background:transparent; color:#cdd9e8; border-radius:6px; cursor:pointer; }
  .seg button.on { background:#4fd1a5; border-color:#4fd1a5; color:#0f2540; font-weight:700; }
  select { width:100%; padding:7px 8px; font-size:13px; border-radius:6px; border:1px solid rgba(255,255,255,.25); background:#16304f; color:#fff; }

  /* ── 통계/목록 영역 ─────────────────────────── */
  #stats { flex:1; overflow-y:auto; padding:12px 18px; }
  .card { background:rgba(255,255,255,.06); border-radius:8px; padding:12px 14px; margin-bottom:12px; }
  .card h3 { font-size:12.5px; color:#9db3cc; margin-bottom:8px; font-weight:600; }
  .big { font-size:22px; font-weight:800; color:#4fd1a5; }
  .big small { font-size:12px; color:#9db3cc; font-weight:400; margin-left:4px; }
  .sub { font-size:12px; color:#cdd9e8; margin-top:4px; }
  table.tb { width:100%; border-collapse:collapse; font-size:12px; }
  table.tb th { text-align:left; color:#9db3cc; font-weight:600; padding:4px 2px; border-bottom:1px solid rgba(255,255,255,.15); }
  table.tb td { padding:4px 2px; border-bottom:1px solid rgba(255,255,255,.07); color:#e8eef5; }
  table.tb td.num, table.tb th.num { text-align:right; font-variant-numeric:tabular-nums; }
  .rowlink { cursor:pointer; } .rowlink:hover td { background:rgba(255,255,255,.06); }
  .bar { height:6px; background:#4fd1a5; border-radius:3px; margin-top:2px; }

  /* ── 상세 패널 ──────────────────────────────── */
  #detail { position:absolute; top:12px; right:48px; width:330px; max-height:calc(100% - 24px); overflow-y:auto;
            background:#fff; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,.25); padding:16px; display:none; z-index:20; }
  #detail h2 { font-size:15px; letter-spacing:-.4px; color:#0f2540; padding-right:24px; }
  #detail .road { font-size:11.5px; color:#667; margin-top:3px; }
  #detail .tag { display:inline-block; margin-top:8px; padding:3px 8px; font-size:11px; background:#e6f7f0; color:#0b8a5f; border-radius:20px; font-weight:700; }
  #detail .meta { font-size:12px; color:#445; margin-top:8px; line-height:1.7; }
  #dclose { position:absolute; top:10px; right:12px; border:none; background:none; font-size:18px; cursor:pointer; color:#889; }
  .chart { margin-top:12px; }
  .chart h4 { font-size:12px; color:#0f2540; margin-bottom:6px; }
  .crow { display:flex; align-items:center; gap:6px; font-size:11px; margin-bottom:4px; color:#334; }
  .crow .lb { width:52px; color:#667; }
  .crow .br { height:12px; border-radius:3px; min-width:2px; }
  .crow .vl { font-variant-numeric:tabular-nums; }
  .be { background:#3b82f6; } .bg { background:#f59e0b; }

  /* ── 지도 위 오버레이 ───────────────────────── */
  #legend { position:absolute; left:12px; bottom:28px; z-index:10; background:rgba(255,255,255,.95); border-radius:8px; padding:10px 12px; font-size:11px; color:#334; box-shadow:0 2px 8px rgba(0,0,0,.15); }
  #legend .g { display:flex; align-items:center; gap:6px; margin-top:3px; }
  #legend .dot { width:12px; height:12px; border-radius:50%; }
  #progress { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:30; background:#0f2540; color:#fff; padding:8px 18px; border-radius:20px; font-size:12.5px; display:none; box-shadow:0 2px 10px rgba(0,0,0,.3); }
  #sdkerr { position:absolute; inset:0; z-index:50; background:#f4f6f9; display:none; align-items:center; justify-content:center; }
  #sdkerr .box { max-width:520px; background:#fff; border-radius:12px; padding:28px 32px; box-shadow:0 4px 24px rgba(0,0,0,.12); font-size:14px; line-height:1.8; color:#223; }
  #sdkerr h2 { font-size:18px; margin-bottom:10px; color:#c0392b; }
  #sdkerr code { background:#eef2f7; padding:2px 6px; border-radius:4px; font-size:13px; }
  .cnt { font-size:11px; color:#9db3cc; margin-top:2px; }

  /* ── 용도 체크박스 목록 ─────────────────────── */
  #usageList { max-height:180px; overflow-y:auto; border:1px solid rgba(255,255,255,.2); border-radius:6px; padding:6px 8px; background:#16304f; }
  #usageList label { display:flex; align-items:center; gap:6px; font-size:12px; color:#e8eef5; padding:2.5px 0; cursor:pointer; }
  #usageList label:hover { color:#4fd1a5; }
  #usageList input { accent-color:#4fd1a5; }
  #usageList .uc { color:#9db3cc; font-size:11px; margin-left:auto; }
  .mini { float:right; font-size:10.5px; padding:1px 7px; border:1px solid rgba(255,255,255,.3); background:transparent; color:#9db3cc; border-radius:10px; cursor:pointer; }
  .mini:hover { color:#4fd1a5; border-color:#4fd1a5; }

  /* ── 상단 탭 ────────────────────────────────── */
  .tabs { display:flex; gap:6px; margin-top:10px; }
  .tabs button { flex:1; padding:8px 0; font-size:13.5px; font-weight:700; border:1px solid rgba(255,255,255,.25);
    background:transparent; color:#cdd9e8; border-radius:8px; cursor:pointer; }
  .tabs button.on { background:#4fd1a5; border-color:#4fd1a5; color:#0f2540; }

  /* ── 탄소중립계획 탭 ────────────────────────── */
  #tabCarbon { flex:1; overflow-y:auto; padding:12px 18px; }
  #tabCarbon .card h3 { color:#7fe3c0; }
  #tabCarbon .sec { font-size:13.5px; font-weight:800; color:#fff; margin:14px 0 8px; padding-bottom:5px; border-bottom:2px solid #4fd1a5; }
  #tabCarbon ul { margin:4px 0 4px 16px; }
  #tabCarbon li { font-size:12px; color:#cdd9e8; line-height:1.65; margin-bottom:3px; }
  .kpi { display:flex; gap:8px; margin:8px 0; }
  .kpi > div { flex:1; background:rgba(79,209,165,.12); border-radius:8px; padding:8px; text-align:center; }
  .kpi .v { font-size:16px; font-weight:800; color:#4fd1a5; }
  .kpi .l { font-size:10.5px; color:#9db3cc; margin-top:2px; }
  .yrow { display:flex; align-items:center; gap:6px; font-size:11px; margin-bottom:5px; color:#cdd9e8; }
  .yrow .yl { width:38px; color:#9db3cc; }
  .yrow .yb { height:13px; border-radius:3px; background:#4fd1a5; min-width:2px; }
  .yrow .yb.alt { background:#3b82f6; }
  .yrow .yv { font-variant-numeric:tabular-nums; white-space:nowrap; }
  .pj { padding:7px 9px; border-radius:6px; background:rgba(255,255,255,.05); margin-bottom:5px; cursor:pointer; font-size:12px; color:#e8eef5; }
  .pj:hover { background:rgba(79,209,165,.16); }
  .pj .pid { color:#7fe3c0; font-weight:700; margin-right:4px; }
  .pj .pmeta { font-size:10.5px; color:#9db3cc; margin-top:2px; }
  .phase { background:rgba(255,255,255,.06); border-left:3px solid #4fd1a5; border-radius:0 8px 8px 0; padding:9px 12px; margin-bottom:8px; }
  .phase b { font-size:12.5px; color:#7fe3c0; }
  .phase .py { font-size:11px; color:#9db3cc; margin-left:6px; }

  /* ── 탄소중립 메뉴(사이드바) ─────────────────── */
  .cm { padding:11px 13px; margin-bottom:6px; border-radius:8px; background:rgba(255,255,255,.06);
    font-size:13.5px; font-weight:700; color:#e8eef5; cursor:pointer; border-left:3px solid transparent; }
  .cm:hover { background:rgba(79,209,165,.14); }
  .cm.on { background:rgba(79,209,165,.18); border-left-color:#4fd1a5; color:#7fe3c0; }
  .pj.on { background:rgba(79,209,165,.18); }

  /* ── 오른쪽 대시보드 공통 ────────────────────── */
  .cpsub { font-size:12px; color:#667; margin-top:5px; }
  .dash3 { display:flex; gap:12px; margin:16px 0; }
  .dash3 .dcard { flex:1; background:#f0faf6; border:1px solid #d5efe4; border-radius:10px; padding:14px; text-align:center; }
  .dv { font-size:22px; font-weight:800; color:#0b8a5f; }
  .dl { font-size:11px; color:#667; margin-top:4px; }
  .dsec { font-size:13.5px; font-weight:800; color:#0f2540; margin:16px 0 8px; padding-bottom:4px; border-bottom:2px solid #4fd1a5; }
  .dquote { background:#f4f7fa; border-left:4px solid #4fd1a5; border-radius:0 8px 8px 0; padding:10px 14px; font-size:13.5px; color:#223; line-height:1.6; }
  .dul { margin:4px 0 4px 18px; }
  .dul li { font-size:12.5px; color:#334; line-height:1.7; margin-bottom:3px; }
  .dgrid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .dgrid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:12px; }
  .dphase { background:#f8fafc; border:1px solid #e4eaf0; border-top:4px solid #4fd1a5; border-radius:10px; padding:12px 14px; }
  .dpname { font-size:14px; font-weight:800; color:#0f2540; }
  .dpyear { font-size:12px; color:#0b8a5f; font-weight:700; margin:2px 0 4px; }
  .dpdesc { font-size:11.5px; color:#667; margin-bottom:6px; }
  .dnote { font-size:11px; color:#889; margin-top:6px; }
  @media (max-width:1100px){ .dgrid2,.dgrid3 { grid-template-columns:1fr; } }

  /* ── 탄소중립 사업 상세(지도 영역 패널) ──────── */
  #carbonPanel { position:absolute; inset:12px; z-index:25; background:#fff; border-radius:12px;
    box-shadow:0 6px 28px rgba(0,0,0,.3); padding:22px 26px; overflow-y:auto; display:none; }
  #carbonPanel h2 { font-size:18px; color:#0f2540; padding-right:30px; }
  #carbonPanel .ptag { display:inline-block; margin:8px 6px 0 0; padding:3px 10px; font-size:11px; border-radius:20px; font-weight:700; background:#e6f7f0; color:#0b8a5f; }
  #carbonPanel table.dt { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:14px; }
  #carbonPanel table.dt th { width:110px; text-align:left; color:#667; font-weight:600; padding:7px 8px; background:#f4f7fa; border:1px solid #e4eaf0; vertical-align:top; }
  #carbonPanel table.dt td { padding:7px 10px; border:1px solid #e4eaf0; color:#223; line-height:1.55; }
  #cpClose { position:absolute; top:14px; right:16px; border:none; background:none; font-size:20px; cursor:pointer; color:#889; }
  .cyr { display:flex; align-items:center; gap:8px; font-size:12px; margin-bottom:5px; color:#334; }
  .cyr .cl { width:44px; color:#667; }
  .cyr .cb { height:14px; border-radius:3px; background:#0ea371; min-width:2px; }
  .cyr .cv { font-variant-numeric:tabular-nums; }

  /* ── 검색창 ─────────────────────────────────── */
  #searchBox { width:100%; padding:8px 10px; font-size:13px; border-radius:6px; border:1px solid rgba(255,255,255,.25); background:#16304f; color:#fff; }
  #searchBox::placeholder { color:#7a8fa8; }
  #searchResults { position:absolute; left:18px; right:18px; top:100%; margin-top:-6px; z-index:40;
    background:#1d3a5f; border:1px solid rgba(255,255,255,.25); border-radius:6px; max-height:240px; overflow-y:auto; display:none; box-shadow:0 6px 16px rgba(0,0,0,.4); }
  #searchResults .sr { padding:7px 10px; font-size:12px; color:#e8eef5; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.07); }
  #searchResults .sr:hover { background:rgba(79,209,165,.15); }
  #searchResults .sr b { color:#4fd1a5; font-weight:700; }
  #searchResults .sr .sub2 { color:#9db3cc; font-size:11px; margin-top:1px; }
</style>
</head>
<body>
<div id="wrap">
  <!-- 왼쪽 사이드바 -->
  <aside id="sidebar">
    <div class="hd">
      <h1>노원구 <span>에너지정보플랫폼</span></h1>
      <div class="tabs">
        <button id="tabBtnEnergy" class="on">⚡ 에너지정보</button>
        <button id="tabBtnCarbon">🌱 탄소중립계획</button>
      </div>
    </div>
    <div id="tabEnergy">
    <div class="ctrl" style="position:relative">
      <label class="t">검색 (주소 · 건물명)</label>
      <input id="searchBox" type="text" placeholder="예: 상계동 666, 해링턴, 마들로 45" autocomplete="off">
      <div id="searchResults"></div>
    </div>
    <div class="ctrl">
      <label class="t">에너지 종류</label>
      <div class="seg" id="segEnergy">
        <button data-v="elec" class="on">⚡ 전기 (kWh)</button>
        <button data-v="gas">🔥 가스 (MJ)</button>
      </div>
    </div>
    <div class="ctrl">
      <label class="t">사용 년월</label>
      <div class="seg">
        <select id="selYear" style="flex:1"></select>
        <select id="selMonth" style="flex:1"></select>
      </div>
    </div>
    <div class="ctrl">
      <label class="t">건축물 용도 <button id="usageAll" class="mini">전체 선택/해제</button></label>
      <div id="usageList"></div>
      <div class="cnt" id="cntInfo"></div>
    </div>
    <div id="stats"></div>
    <div style="padding:8px 18px; border-top:1px solid rgba(255,255,255,.12)">
      <button id="exportCoords" class="mini" style="float:none">📥 좌표 캐시 내보내기 (coords.json)</button>
    </div>
    </div><!-- /tabEnergy -->
    <div id="tabCarbon" style="display:none"></div>
  </aside>

  <!-- 지도 -->
  <div id="map">
    <div id="progress">주소 좌표 변환 중… <span id="pgTxt"></span></div>
    <div id="legend"></div>
    <div id="detail">
      <button id="dclose">✕</button>
      <div id="dbody"></div>
    </div>
    <div id="carbonPanel">
      <button id="cpClose">✕</button>
      <div id="cpBody"></div>
    </div>
    <div id="sdkerr"><div class="box">
      <h2>카카오지도를 불러올 수 없습니다</h2>
      카카오 개발자 콘솔(<code>developers.kakao.com</code>)에서 이 앱의<br>
      <b>[앱 설정 → 플랫폼 → Web]</b> 에 아래 도메인을 등록해 주세요.<br><br>
      <code id="curOrigin">http://localhost:8000</code><br><br>
      등록 후 이 페이지를 새로고침하면 지도가 표시됩니다.
    </div></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// 노원구 에너지정보플랫폼 메인 스크립트
// ══════════════════════════════════════════════════════
const KAKAO_KEY = 'd5eb9a066a7f486f605d8e200c63d65b';   // 카카오 JavaScript 키
const CACHE_KEY = 'nowon_geocode_v1';                    // 좌표 캐시(localStorage)

let DATA = null;          // data.json 내용
let map = null;           // 카카오 지도 객체
let geocoder = null;      // 주소→좌표 변환기
let places = null;        // 카카오 장소(키워드) 검색 서비스
let searchMarker = null;  // 카카오 장소 검색 결과 임시 마커
let coords = {};          // 주소 → {lat,lng}
let overlays = [];        // 지도에 그려진 원(Circle) 목록
let state = { energy:'elec', month:'', usages:new Set() };  // 현재 필터 상태 (usages: 선택된 용도 집합)

const fmt = n => Math.round(n).toLocaleString('ko-KR');
const ymLabel = ym => ym.slice(0,4) + '.' + ym.slice(4);

// ── 1) 데이터 로드 ─────────────────────────────────────
fetch('data.json').then(r=>r.json()).then(d=>{
  DATA = d;
  state.month = d.months[d.months.length-1];   // 최신 월 기본 선택
  buildMonthButtons();
  buildUsageSelect();
  initSearch();                                 // 검색창 활성화
  loadKakao();                                  // 지도 SDK 로드
});

// ── 2) 카카오 SDK 동적 로드 (도메인 미등록 시 안내) ────
function loadKakao(){
  const s = document.createElement('script');
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_KEY}&libraries=services&autoload=false`;
  s.onload = () => kakao.maps.load(()=>{ initMap(); places = new kakao.maps.services.Places(); });
  s.onerror = () => {
    document.getElementById('curOrigin').textContent = location.origin;  // 현재 접속 도메인 표시
    document.getElementById('sdkerr').style.display='flex';
  };
  document.head.appendChild(s);
}

function initMap(){
  // 노원구청 부근을 중심으로 지도 생성
  map = new kakao.maps.Map(document.getElementById('map'),
        { center: new kakao.maps.LatLng(37.6543, 127.0568), level: 6 });
  // 지도 확대/축소(+/-) 컨트롤 추가 (오른쪽 중앙)
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
  drawBoundary();                                  // 노원구 경계선 표시
  geocoder = new kakao.maps.services.Geocoder();
  coords = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  // 사전 계산된 좌표 파일(coords.json)을 먼저 불러와 병합 → 방문자별 재변환 방지
  fetch('coords.json').then(r=>r.ok?r.json():{}).catch(()=>({})).then(pre=>{
    coords = Object.assign({}, pre, coords);
    geocodeAll().then(()=>{ render(); });
  });
}

// ── 2-1) 노원구 경계선 그리기 ─────────────────────────
function drawBoundary(){
  fetch('nowon_boundary.json').then(r=>r.ok?r.json():null).catch(()=>null).then(rings=>{
    if (!rings) return;
    rings.forEach(ring=>{
      new kakao.maps.Polygon({
        map,
        path: ring.map(([lat,lng])=>new kakao.maps.LatLng(lat,lng)),
        strokeWeight:3, strokeColor:'#0f2540', strokeOpacity:.85, strokeStyle:'solid',
        fillColor:'#0f2540', fillOpacity:.03    // 경계 안쪽 아주 옅은 음영
      });
    });
  });
}

// ── 3) 주소 일괄 지오코딩 (캐시 사용, 순차 처리) ───────
async function geocodeAll(){
  const targets = DATA.buildings.map(b=>b.addr).filter(a=>!(a in coords));
  if (!targets.length) return;
  const pg = document.getElementById('progress');
  pg.style.display='block';
  let done = 0;
  for (const addr of targets){
    await new Promise(res=>{
      geocoder.addressSearch(addr, (result, status)=>{
        if (status === kakao.maps.services.Status.OK && result[0]){
          coords[addr] = { lat:+result[0].y, lng:+result[0].x };
        } else {
          coords[addr] = null;   // 변환 실패도 기록(재시도 방지)
        }
        res();
      });
      setTimeout(res, 1500);     // 응답 지연 대비 안전장치
    });
    done++;
    if (done % 25 === 0){        // 25건마다 캐시 저장 + 진행률 갱신
      localStorage.setItem(CACHE_KEY, JSON.stringify(coords));
      document.getElementById('pgTxt').textContent = `${done} / ${targets.length}`;
      render();                  // 중간중간 지도에 반영
    }
    await new Promise(r=>setTimeout(r, 35));   // 호출 간격(과속 방지)
  }
  localStorage.setItem(CACHE_KEY, JSON.stringify(coords));
  pg.style.display='none';
}

// ── 4) 필터 UI 구성 ────────────────────────────────────
function buildMonthButtons(){
  // 연도 드롭다운 + 월 드롭다운 구성 (데이터에 있는 년월만 표시)
  const selY = document.getElementById('selYear');
  const selM = document.getElementById('selMonth');
  const years = [...new Set(DATA.months.map(m=>m.slice(0,4)))].sort();

  // 연도 옵션 채우기
  years.forEach(y=>{
    const o = document.createElement('option');
    o.value=y; o.textContent=y+'년';
    selY.appendChild(o);
  });

  // 선택된 연도에 해당하는 월 옵션 채우기 (+ 연간 전체 옵션)
  function fillMonths(year, keep){
    selM.innerHTML='';
    const oAll = document.createElement('option');       // 연간 합계 옵션
    oAll.value = year; oAll.textContent = '전체 (연간 합계)';
    selM.appendChild(oAll);
    DATA.months.filter(m=>m.startsWith(year)).forEach(m=>{
      const o = document.createElement('option');
      o.value=m; o.textContent=parseInt(m.slice(4))+'월';
      selM.appendChild(o);
    });
    // 기존 선택 유지, 아니면 해당 연도의 마지막 월 선택
    selM.value = (keep && keep.startsWith(year)) ? keep : selM.lastChild.value;
    state.month = selM.value;
  }

  selY.value = state.month.slice(0,4);
  fillMonths(selY.value, state.month);
  selY.onchange = ()=>{ fillMonths(selY.value); render(); };
  selM.onchange = ()=>{ state.month = selM.value; render(); };

  const segE = document.getElementById('segEnergy');
  segE.querySelectorAll('button').forEach(b=>{
    b.onclick = ()=>{ state.energy=b.dataset.v; setSeg(segE,b); render(); };
  });
}
function setSeg(seg,btn){ seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); btn.classList.add('on'); }

function buildUsageSelect(){
  // 용도별 건물 수를 세어 많은 순으로 체크박스 목록 구성 (기본: 전체 선택)
  const cnt = {};
  let none = 0;
  DATA.buildings.forEach(b=>{
    if (b.usage) cnt[b.usage]=(cnt[b.usage]||0)+1;
    else none++;
  });
  const entries = Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  entries.push(['__none__', none]);                 // 용도정보 없음 항목

  const list = document.getElementById('usageList');
  entries.forEach(([u,c])=>{
    state.usages.add(u);                            // 기본값: 모두 선택
    const lb = document.createElement('label');
    lb.innerHTML = `<input type="checkbox" checked value="${u}">
      <span>${u==='__none__'?'용도정보 없음':u}</span><span class="uc">${c}</span>`;
    lb.querySelector('input').onchange = e=>{
      e.target.checked ? state.usages.add(u) : state.usages.delete(u);
      render();
    };
    list.appendChild(lb);
  });

  // 전체 선택/해제 토글 버튼
  document.getElementById('usageAll').onclick = ()=>{
    const boxes = [...list.querySelectorAll('input')];
    const turnOn = boxes.some(x=>!x.checked);       // 하나라도 꺼져 있으면 전체 켬
    boxes.forEach(x=>{
      x.checked = turnOn;
      turnOn ? state.usages.add(x.value) : state.usages.delete(x.value);
    });
    render();
  };
}

// ── 5) 현재 필터에 맞는 건물 목록 ─────────────────────
// 현재 선택 기간의 사용량 (월: 해당 월 값 / 연도(4자리): 그 해 전체 합계)
function usageOf(b){
  const obj = b[state.energy];
  if (state.month.length === 4){                 // '2025' 같은 연간 선택
    let s = 0;
    for (const m in obj) if (m.startsWith(state.month)) s += obj[m];
    return s || undefined;                       // 0이면 데이터 없음 취급
  }
  return obj[state.month];
}
// 기간 라벨 ('2025.03' 또는 '2025년 전체')
function periodLabel(){
  return state.month.length===4 ? state.month+'년 전체' : ymLabel(state.month);
}
// 용도 필터 통과 여부 (체크된 용도만 표시)
function passUsage(b){
  return state.usages.has(b.usage || '__none__');
}
// 사용량 있는 건물 (색상 마커 대상)
function filtered(){
  return DATA.buildings.filter(b=>{
    const v = usageOf(b);
    if (v===undefined || v===0) return false;   // 해당 기간 사용량 없는 건물 제외
    return passUsage(b);
  });
}
// 사용량은 없지만 용도정보(표제부)가 있는 건물 (회색 마커 대상)
function noDataBuildings(){
  return DATA.buildings.filter(b=>{
    const v = usageOf(b);
    if (v!==undefined && v!==0) return false;   // 사용량 있으면 색상 마커에서 처리
    if (!b.usage) return false;                 // 표제부 정보도 없으면 제외
    return passUsage(b);
  });
}

// 사용량 → 색상 (5단계: 파랑=적음 ~ 빨강=많음)
const GRADES = ['#3b82f6','#22c55e','#eab308','#f97316','#ef4444'];
function gradeOf(v, thresholds){
  for (let i=0;i<thresholds.length;i++) if (v<=thresholds[i]) return i;
  return GRADES.length-1;
}

// ── 6) 지도 + 통계 렌더링 ─────────────────────────────
function render(){
  if (!map) return;
  overlays.forEach(o=>o.setMap(null)); overlays=[];   // 기존 표시 제거

  const list = filtered();
  const vals = list.map(b=>usageOf(b)).sort((a,b)=>a-b);
  // 5분위 기준값 계산 (분포에 따른 등급 색상)
  const q = p => vals.length ? vals[Math.min(vals.length-1, Math.floor(vals.length*p))] : 0;
  const th = [q(.2), q(.4), q(.6), q(.8)];

  let shown = 0;
  list.forEach(b=>{
    const c = coords[b.addr];
    if (!c) return;
    const v = usageOf(b);
    const g = gradeOf(v, th);
    // 원 크기는 통일하고 사용량은 색상으로만 구분
    const circle = new kakao.maps.Circle({
      center:new kakao.maps.LatLng(c.lat,c.lng), radius:11,
      strokeWeight:1, strokeColor:GRADES[g], strokeOpacity:.9,
      fillColor:GRADES[g], fillOpacity:.45, map
    });
    kakao.maps.event.addListener(circle,'click',()=>showDetail(b));
    overlays.push(circle);
    shown++;
  });

  // 사용량 데이터가 없는 표제부 건물은 회색 마커로 표시
  const noData = noDataBuildings();
  let shownGray = 0;
  noData.forEach(b=>{
    const c = coords[b.addr];
    if (!c) return;
    const circle = new kakao.maps.Circle({
      center:new kakao.maps.LatLng(c.lat,c.lng), radius:11,
      strokeWeight:1, strokeColor:'#6b7280', strokeOpacity:.8,
      fillColor:'#9ca3af', fillOpacity:.5, map
    });
    kakao.maps.event.addListener(circle,'click',()=>showDetail(b));
    overlays.push(circle);
    shownGray++;
  });

  document.getElementById('cntInfo').textContent =
    `사용량 ${list.length}개소 (좌표 ${shown}) · 사용량없는 건물 ${noData.length}개소 (좌표 ${shownGray})`;
  renderLegend(th);
  renderStats(list);
}

function renderLegend(th){
  const unit = state.energy==='elec'?'kWh':'MJ';
  const lbs = [`~ ${fmt(th[0])}`, `~ ${fmt(th[1])}`, `~ ${fmt(th[2])}`, `~ ${fmt(th[3])}`, `${fmt(th[3])} ~`];
  document.getElementById('legend').innerHTML =
    `<b>${periodLabel()} ${state.energy==='elec'?'전기':'가스'} 사용량 (${unit})</b>` +
    GRADES.map((c,i)=>`<div class="g"><span class="dot" style="background:${c}"></span>${lbs[i]}</div>`).join('') +
    `<div class="g"><span class="dot" style="background:#9ca3af"></span>사용량 정보 없음 (표제부만)</div>`;
}

// ── 7) 사이드바 통계 ──────────────────────────────────
function renderStats(list){
  const unit = state.energy==='elec'?'kWh':'MJ';
  const key = state.energy;
  const total = list.reduce((s,b)=>s+usageOf(b),0);

  // 용도별 집계
  const byUsage = {};
  list.forEach(b=>{
    const u = b.usage || '용도정보 없음';
    (byUsage[u] = byUsage[u] || {n:0,sum:0});
    byUsage[u].n++; byUsage[u].sum += usageOf(b);
  });
  const usageRows = Object.entries(byUsage).sort((a,b)=>b[1].sum-a[1].sum);
  const maxU = usageRows.length?usageRows[0][1].sum:1;

  // 상위 10개 건물
  const top = [...list].sort((a,b)=>usageOf(b)-usageOf(a)).slice(0,10);

  document.getElementById('stats').innerHTML = `
    <div class="card">
      <h3>${periodLabel()} ${key==='elec'?'전기':'가스'} 총 사용량</h3>
      <div class="big">${fmt(total)}<small>${unit}</small></div>
      <div class="sub">대상 ${list.length}개소 · 평균 ${fmt(list.length?total/list.length:0)} ${unit}</div>
    </div>
    <div class="card">
      <h3>건축물 용도별 사용량</h3>
      <table class="tb"><tr><th>용도</th><th class="num">개소</th><th class="num">${unit}</th></tr>
      ${usageRows.map(([u,o])=>`
        <tr><td>${u}<div class="bar" style="width:${Math.max(2,100*o.sum/maxU)}%"></div></td>
        <td class="num">${o.n}</td><td class="num">${fmt(o.sum)}</td></tr>`).join('')}
      </table>
    </div>
    <div class="card">
      <h3>사용량 상위 10개소</h3>
      <table class="tb"><tr><th>#</th><th>주소</th><th class="num">${unit}</th></tr>
      ${top.map((b,i)=>`
        <tr class="rowlink" onclick="focusBuilding('${b.addr.replace(/'/g,"\\'")}')">
        <td>${i+1}</td><td>${b.addr.replace('서울특별시 노원구 ','')}</td>
        <td class="num">${fmt(usageOf(b))}</td></tr>`).join('')}
      </table>
    </div>`;
}

// ── 7-1) 검색 (주소·건물명·도로명) ────────────────────
function initSearch(){
  const box = document.getElementById('searchBox');
  const res = document.getElementById('searchResults');

  let debounce = null;   // 카카오 호출 과다 방지용 타이머

  // 결과 목록을 화면에 그리고 클릭 이벤트 연결
  function renderResults(localHits, kakaoHits){
    let html = '';
    if (localHits.length){
      html += '<div class="sr" style="color:#9db3cc;cursor:default">📊 데이터 내 건물</div>';
      html += localHits.map(b=>`
        <div class="sr" data-addr="${b.addr.replace(/"/g,'&quot;')}">
          ${b.name?`<b>${b.name}</b> · `:''}${b.addr.replace('서울특별시 노원구 ','')}
          <div class="sub2">${b.usage||'용도정보 없음'}${b.road?' · '+b.road.replace('서울특별시 노원구 ',''):''}</div>
        </div>`).join('');
    }
    if (kakaoHits.length){
      html += '<div class="sr" style="color:#9db3cc;cursor:default">🗺️ 카카오 장소 검색</div>';
      html += kakaoHits.map((p,i)=>`
        <div class="sr" data-kakao="${i}">
          <b>${p.place_name}</b>
          <div class="sub2">${p.address_name}${p.category_group_name?' · '+p.category_group_name:''}</div>
        </div>`).join('');
    }
    if (!html) html = '<div class="sr">검색 결과 없음</div>';
    res.innerHTML = html;
    res.style.display='block';
    res.querySelectorAll('.sr[data-addr]').forEach(el=>{
      el.onclick = ()=>{ focusBuilding(el.dataset.addr); res.style.display='none'; };
    });
    res.querySelectorAll('.sr[data-kakao]').forEach(el=>{
      el.onclick = ()=>{ goKakaoPlace(kakaoHits[+el.dataset.kakao]); res.style.display='none'; };
    });
  }

  // 카카오 장소 결과 클릭: 우리 데이터와 주소 매칭 시도 → 있으면 상세, 없으면 위치 표시
  function goKakaoPlace(p){
    // 카카오 주소 '서울 노원구 …' → 우리 형식 '서울특별시 노원구 …' 로 정규화
    const addr = (p.address_name||'').replace(/^서울\s/, '서울특별시 ').trim();
    const b = DATA.buildings.find(x=>x.addr===addr);
    if (searchMarker) searchMarker.setMap(null);            // 이전 임시 마커 제거
    if (b && coords[b.addr]){ focusBuilding(b.addr); return; }
    // 데이터에 없는 장소: 지도 이동 + 임시 마커만 표시
    const pos = new kakao.maps.LatLng(+p.y, +p.x);
    map.setLevel(4); map.panTo(pos);
    searchMarker = new kakao.maps.Marker({ map, position:pos, title:p.place_name });
  }

  box.oninput = ()=>{
    const q = box.value.trim();
    if (q.length < 2){ res.style.display='none'; return; }   // 2글자부터 검색
    // 1) 우리 데이터에서 주소/건물명/도로명 검색 (최대 7건)
    const ql = q.toLowerCase();
    const hits = [];
    for (const b of DATA.buildings){
      const hay = `${b.addr} ${b.name||''} ${b.road||''}`.toLowerCase();
      if (hay.includes(ql)){
        hits.push(b);
        if (hits.length >= 7) break;
      }
    }
    renderResults(hits, []);
    // 2) 카카오 장소 검색 병행 (0.3초 디바운스, 노원구 내 결과만)
    clearTimeout(debounce);
    debounce = setTimeout(()=>{
      if (!places) return;
      places.keywordSearch(q, (data, status)=>{
        if (box.value.trim() !== q) return;                  // 입력이 바뀌었으면 무시
        const kakaoHits = (status===kakao.maps.services.Status.OK ? data : [])
          .filter(p=>p.address_name && p.address_name.includes('노원구')).slice(0,5);
        renderResults(hits, kakaoHits);
      }, { location: new kakao.maps.LatLng(37.6543, 127.0568), radius: 7000 });
    }, 300);
  };
  // 검색창 밖 클릭 시 결과 닫기
  document.addEventListener('click', e=>{
    if (!box.contains(e.target) && !res.contains(e.target)) res.style.display='none';
  });
  // 엔터 → 첫 번째 결과로 이동
  box.onkeydown = e=>{
    if (e.key==='Enter'){
      const first = res.querySelector('.sr[data-addr]');
      if (first){ focusBuilding(first.dataset.addr); res.style.display='none'; }
    }
  };
}

// 상위 목록 클릭 → 지도 이동 + 상세
function focusBuilding(addr){
  const b = DATA.buildings.find(x=>x.addr===addr);
  const c = coords[addr];
  if (b && c){ map.setLevel(4); map.panTo(new kakao.maps.LatLng(c.lat,c.lng)); showDetail(b); }
}

// ── 8) 건물 상세 패널 (월별 전기/가스 차트) ───────────
function showDetail(b){
  const eMax = Math.max(1,...DATA.months.map(m=>b.elec[m]||0));
  const gMax = Math.max(1,...DATA.months.map(m=>b.gas[m]||0));
  const rows = (obj,max,cls,unit)=>DATA.months.map(m=>{
    const v = obj[m];
    return `<div class="crow"><span class="lb">${ymLabel(m)}</span>
      <span class="br ${cls}" style="width:${v?Math.max(2,150*v/max):0}px"></span>
      <span class="vl">${v!==undefined?fmt(v)+' '+unit:'-'}</span></div>`;
  }).join('');
  document.getElementById('dbody').innerHTML = `
    <h2>${b.name?b.name+' — ':''}${b.addr}</h2>
    ${b.road?`<div class="road">${b.road}</div>`:''}
    ${b.usage?`<span class="tag">${b.usage}</span>`:'<span class="tag" style="background:#eee;color:#888">용도정보 없음</span>'}
    <div class="meta">
      ${b.gfa?`연면적 ${fmt(b.gfa)}㎡ · 건축면적 ${fmt(b.bdar||0)}㎡ · 대지면적 ${fmt(b.siar||0)}㎡`:''}
    </div>
    <div class="chart"><h4>⚡ 월별 전기 사용량</h4>${rows(b.elec,eMax,'be','kWh')}</div>
    <div class="chart"><h4>🔥 월별 가스 사용량</h4>${rows(b.gas,gMax,'bg','MJ')}</div>`;
  document.getElementById('detail').style.display='block';
}
document.getElementById('dclose').onclick = ()=>document.getElementById('detail').style.display='none';

  el.classList.add('on');
}

// ── 오른쪽 대시보드: 섹션별 내용 ──────────────────────
function showCarbonSection(key){
  const o = CARBON.overview, s = CARBON.status, t = CARBON.targets;
  let html = '';

  if (key === 'overview'){
    html = `
      <h2>🌱 ${o.title}</h2>
      <div class="cpsub">${o.date} · ${o.period}</div>
      <div class="dash3">
        <div class="dcard"><div class="dv">${fmt(o.keyNumbers.totalReduction)}</div><div class="dl">2030 감축목표 (tCO₂eq)</div></div>
        <div class="dcard"><div class="dv">${o.keyNumbers.totalBudget.toLocaleString()}억</div><div class="dl">총사업비 (2026~2030)</div></div>
        <div class="dcard"><div class="dv">30개</div><div class="dl">추진 사업</div></div>
      </div>
      <div class="dsec">비전</div>
      <div class="dquote">${o.vision}</div>
      <div class="dsec">추진 방향</div>
      <ul class="dul">${o.direction.map(d=>`<li>${d}</li>`).join('')}</ul>
      <div class="dgrid2">
        <div><div class="dsec">핵심전략 (단기)</div><ul class="dul">${o.strategiesCore.map(x=>`<li>${x}</li>`).join('')}</ul></div>
        <div><div class="dsec">보완전략 (장기)</div><ul class="dul">${o.strategiesLong.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      </div>
      <div class="dsec">감축 기여</div>
      <ul class="dul"><li>${o.keyNumbers.contribution}</li><li>${o.keyNumbers.target2030}</li></ul>`;
  }

  if (key === 'status'){
    const shareMax = Math.max(...s.sectorShare.map(x=>x[1]));
    html = `
      <h2>📊 온실가스 배출 현황</h2>
      <div class="cpsub">노원구 관리권한 배출량 기준 (출처: 노원구 탄소중립 녹색성장 기본계획)</div>
      <div class="dash3">
        <div class="dcard"><div class="dv">${fmt(s.total2018.all)}천t</div><div class="dl">2018 총 배출량 (tCO₂eq)</div></div>
        <div class="dcard"><div class="dv">${fmt(s.total2018.managed)}천t</div><div class="dl">관리권한 배출량 (2018)</div></div>
        <div class="dcard"><div class="dv">71.3%</div><div class="dl">건물 부문 비중</div></div>
      </div>
      <div class="dgrid2">
        <div>
          <div class="dsec">연도별 배출량 추이 (천tCO₂eq)</div>
          ${s.byYear.years.map((y,i)=>`
            <div class="cyr"><span class="cl">${y}</span>
            <span class="cb" style="background:#2563eb;width:${260*s.byYear['합계'][i]/1700}px"></span>
            <span class="cv">${fmt(s.byYear['합계'][i])}</span></div>`).join('')}
          <div class="dnote">건물 ${fmt(s.byYear['건물'][2])} · 수송 ${fmt(s.byYear['수송'][2])} · 폐기물 ${fmt(s.byYear['폐기물'][2])} (2018)</div>
        </div>
        <div>
          <div class="dsec">부문별 배출 비중 (2018)</div>
          ${s.sectorShare.map(([n,v])=>`
            <div class="cyr"><span class="cl" style="width:80px">${n}</span>
            <span class="cb" style="width:${230*v/shareMax}px"></span>
            <span class="cv">${v}%</span></div>`).join('')}
        </div>
      </div>
      <div class="dsec">배출 특성</div>
      <ul class="dul">${s.notes.map(n=>`<li>${n}</li>`).join('')}</ul>`;
  }

  if (key === 'targets'){
    const maxRed = Math.max(...t.yearly.map(y=>y.reduction));
    const maxBud = Math.max(...t.yearly.map(y=>y.budget));
    const maxSec = Math.max(...t.sector2030.map(x=>x.reduction));
    html = `
      <h2>🎯 연차별 목표와 달성률</h2>
      <div class="cpsub">${t.note}</div>
      <div class="dash3">
        <div class="dcard"><div class="dv">${fmt(t.yearly[4].reduction)}</div><div class="dl">2030 누적 감축목표 (tCO₂eq)</div></div>
        <div class="dcard"><div class="dv">${fmt(t.yearly[0].reduction)}</div><div class="dl">2026 첫해 목표 (tCO₂eq)</div></div>
        <div class="dcard"><div class="dv">1,084.3억</div><div class="dl">5년 총 투자</div></div>
      </div>
      <div class="dgrid2">
        <div>
          <div class="dsec">연차별 누적 감축목표 · 달성률</div>
          ${t.yearly.map(y=>`
            <div class="cyr"><span class="cl">${y.year}</span>
            <span class="cb" style="width:${Math.max(3,260*y.reduction/maxRed)}px"></span>
            <span class="cv">${fmt(y.reduction)} <b style="color:#0b8a5f">(${y.rate}%)</b></span></div>`).join('')}
        </div>
        <div>
          <div class="dsec">연차별 투자계획 (억원)</div>
          ${t.yearly.map(y=>`
            <div class="cyr"><span class="cl">${y.year}</span>
            <span class="cb" style="background:#2563eb;width:${260*y.budget/maxBud}px"></span>
            <span class="cv">${y.budget.toLocaleString()}</span></div>`).join('')}
        </div>
      </div>
      <div class="dsec">부문별 2030 감축목표</div>
      ${t.sector2030.map(x=>`
        <div class="cyr"><span class="cl" style="width:100px">${x.name}</span>
        <span class="cb" style="width:${Math.max(3,380*x.reduction/maxSec)}px"></span>
        <span class="cv">${fmt(x.reduction)} tCO₂eq · ${x.budget.toLocaleString()}억원</span></div>`).join('')}`;
  }

  if (key === 'roadmap'){
    html = `
      <h2>🗓️ 단계별 추진 계획 (2026~2030)</h2>
      <div class="cpsub">노원구 사업추진 로드맵(안) 기준</div>
      <div class="dgrid3">
      ${CARBON.roadmap.map(p=>`
        <div class="dphase">
          <div class="dpname">${p.phase}</div>
          <div class="dpyear">${p.years}</div>
          <div class="dpdesc">${p.desc}</div>
          <ul class="dul">${p.items.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>`).join('')}
      </div>`;
  }

  document.getElementById('cpBody').innerHTML = html;
  document.getElementById('carbonPanel').style.display='block';
}

// ── 세부사업 상세 (지도 영역 패널) ────────────────────
function showCarbonDetail(p){
  const d = p.detail;
  const years = [2026,2027,2028,2029,2030];
  const maxY = p.yearly ? Math.max(...p.yearly, 1) : 1;
  document.getElementById('cpBody').innerHTML = `
    <h2>${p.id}. ${p.name}</h2>
    <span class="ptag">${p.sector} 부문</span><span class="ptag" style="background:#eef2f7;color:#445">${p.type}</span>
    <div class="kpi" style="max-width:420px">
      <div style="background:#eafaf3"><div class="v" style="color:#0b8a5f">${p.budget.toLocaleString()}억</div><div class="l" style="color:#667">총사업비</div></div>
      <div style="background:#eef4fd"><div class="v" style="color:#2563eb">${p.reduction?fmt(p.reduction):'—'}</div><div class="l" style="color:#667">2030 감축목표 (tCO₂eq)</div></div>
    </div>
    ${d ? `<table class="dt">
      ${d.내용?`<tr><th>사업내용</th><td>${d.내용}</td></tr>`:''}
      ${d.기간?`<tr><th>사업기간</th><td>${d.기간}</td></tr>`:''}
      ${d.대상지?`<tr><th>사업 대상지</th><td>${d.대상지}</td></tr>`:''}
      ${d.모델?`<tr><th>사업모델</th><td>${d.모델}</td></tr>`:''}
      ${d.재원?`<tr><th>사업비/재원</th><td>${d.재원}</td></tr>`:''}
      ${d.운영?`<tr><th>운영/관리</th><td>${d.운영}</td></tr>`:''}
      ${d.차별성?`<tr><th>차별성</th><td>${d.차별성}</td></tr>`:''}
      ${d.확산?`<tr><th>확산 방향</th><td>${d.확산}</td></tr>`:''}
    </table>` : `<table class="dt">
      <tr><th>사업내용</th><td>${p.desc||''}</td></tr>
      ${p.roadmap?`<tr><th>추진 일정</th><td>${p.roadmap}</td></tr>`:''}
    </table>`}
    ${p.yearly ? `<h3 style="font-size:13.5px;color:#0f2540;margin:16px 0 8px">연차별 누적 감축목표 (tCO₂eq)</h3>
      ${years.map((y,i)=>`
        <div class="cyr"><span class="cl">${y}</span>
        <span class="cb" style="width:${Math.max(2,300*p.yearly[i]/maxY)}px"></span>
        <span class="cv">${p.yearly[i]?fmt(p.yearly[i]):'-'}</span></div>`).join('')}` : ''}`;
  document.getElementById('carbonPanel').style.display='block';
}
document.getElementById('cpClose').onclick = ()=>document.getElementById('carbonPanel').style.display='none';

// ── 9) 좌표 캐시 내보내기 ─────────────────────────────
// 새 주소 지오코딩 후 이 버튼으로 coords.json을 내려받아
// platform/coords.json에 덮어쓰고 git push 하면 다른 방문자도 재변환 없이 사용
document.getElementById('exportCoords').onclick = ()=>{
  const blob = new Blob([JSON.stringify(coords)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'coords.json';
  a.click();
  URL.revokeObjectURL(a.href);
};
</script>
